<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIDSKILLS — Analytics</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --fg: #fff6bf;
      --dim: #cbbf76;
      --accent: #ffd400;
      --border: #3a2f00;
      --hover: #151200;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 1.5rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 980px; margin: 0 auto; }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 0.75rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .title { color: var(--accent); font-weight: 700; }
    .muted { color: var(--dim); font-size: 12px; }
    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      background: rgba(255, 212, 0, 0.02);
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 120px 120px;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    input, button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: inherit;
      font-size: 13px;
      padding: 0.5rem 0.6rem;
      border-radius: 4px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      cursor: pointer;
      color: var(--accent);
    }
    button:hover { border-color: var(--accent); background: var(--hover); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }
    h2 {
      color: var(--accent);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.6rem;
      text-align: left;
    }
    th { background: var(--hover); color: var(--accent); }
    .error { color: var(--accent); margin-top: 0.75rem; }
    .ok { color: var(--dim); margin-top: 0.75rem; }
    .full { grid-column: 1 / -1; }
    @media (max-width: 820px) {
      .controls { grid-template-columns: 1fr 120px; }
      .controls button { grid-column: 1 / -1; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">MIDSKILLS — Analytics</div>
        <div class="muted">Public analytics (aggregated).</div>
      </div>
      <a href="/">← Back</a>
    </div>

    <div class="panel">
      <div class="controls">
        <input id="days" placeholder="Days" inputmode="numeric" value="30">
        <button id="load">Load</button>
      </div>
      <div class="muted">Shows totals, unique visitors, and daily activity by skill.</div>
      <div id="status" class="ok"></div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Totals</h2>
        <div id="totals"></div>
      </div>
      <div class="panel">
        <h2>Unique Visitors</h2>
        <div id="unique"></div>
      </div>
      <div class="panel full">
        <h2>Daily (Last N Days)</h2>
        <div id="daily"></div>
      </div>
      <div class="panel full">
        <h2>User × Skill (Copies)</h2>
        <div id="userSkill"></div>
      </div>
    </div>
  </div>

  <script src="/analytics.js"></script>
  <script>
    try { window.MidnightAnalytics.track("page_view", { meta: { page: "analytics" } }); } catch {}
    try { window.MidnightAnalytics.ensureGithubUsername(); } catch {}

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderTable(rows, cols) {
      if (!rows.length) return "<div class='muted'>No data.</div>";
      let html = "<table><thead><tr>";
      for (const c of cols) html += "<th>" + esc(c.label) + "</th>";
      html += "</tr></thead><tbody>";
      for (const r of rows) {
        html += "<tr>";
        for (const c of cols) html += "<td>" + esc(r[c.key] ?? "") + "</td>";
        html += "</tr>";
      }
      html += "</tbody></table>";
      return html;
    }

    async function load() {
      const days = $("days").value.trim() || "30";
      statusEl.className = "ok";
      statusEl.textContent = "Loading…";

      try {
        const resp = await fetch("/api/analytics?days=" + encodeURIComponent(days));
        const json = await resp.json();
        if (!resp.ok) throw new Error(json?.error || "Request failed");

        statusEl.className = "ok";
        statusEl.textContent = "Range: last " + json.range_days + " days · Rows scanned: " + json.sample_rows;

        $("totals").innerHTML = renderTable(json.totals || [], [
          { key: "skill_name", label: "skill" },
          { key: "events", label: "events" },
        ]);
        $("unique").innerHTML = renderTable(json.unique_visitors || [], [
          { key: "skill_name", label: "skill" },
          { key: "unique_visitors", label: "unique" },
        ]);
        $("daily").innerHTML = renderTable((json.daily || []).slice(0, 200), [
          { key: "date", label: "date" },
          { key: "skill_name", label: "skill" },
          { key: "events", label: "events" },
        ]) + ((json.daily || []).length > 200 ? "<div class='muted' style='margin-top:0.5rem'>Showing first 200 rows.</div>" : "");

        $("userSkill").innerHTML = renderTable((json.user_skill || []).slice(0, 200), [
          { key: "github_username", label: "github" },
          { key: "skill_name", label: "skill" },
          { key: "count", label: "copies" },
        ]) + ((json.user_skill || []).length > 200 ? "<div class='muted' style='margin-top:0.5rem'>Showing first 200 rows.</div>" : "");

      } catch (e) {
        statusEl.className = "error";
        statusEl.textContent = "Error: " + (e && e.message ? e.message : "Unknown");
      }
    }

    $("load").addEventListener("click", load);

    // Initialize from query param
    const params = new URLSearchParams(window.location.search);
    const daysQ = params.get("days");
    if (daysQ) $("days").value = daysQ;
    load();
  </script>
</body>
</html>
